[package]
name = "nanaz"
version = "0.1.0"
edition = "2024"

[dependencies]
serde = { version = "1.0.228", features = ["derive"] }
snow = "0.10.0"
data-encoding = "2.11.0"
toml = "1.1.2"
uuid = { version = "1.23", features = ["v4", "v7", "serde", "v4"] }
serde_json = "1.0.150"
# minreq = { version = "2.14.1", features = ["https-rustls", "serde_json"] }
ureq = { version = "2.9", features = ["native-tls"] }
native-tls = "0.2"

[build-dependencies]
# 🌟 关键：让编译脚本具备解析 JSON 的能力
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
